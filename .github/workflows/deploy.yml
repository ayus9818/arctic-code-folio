name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Detect build output
        id: detect
        run: |
          if [ -f dist/index.html ]; then
            echo "dir=dist" >> $GITHUB_OUTPUT
          elif [ -f .output/public/index.html ]; then
            echo "dir=.output/public" >> $GITHUB_OUTPUT
          elif [ -f build/index.html ]; then
            echo "dir=build" >> $GITHUB_OUTPUT
          else
            echo "No index.html found in dist, .output/public, or build"
            find . -type f | grep "index.html" || true
            exit 1
          fi

      - name: Copy index.html to 404.html
        run: cp "${{ steps.detect.outputs.dir }}/index.html" "${{ steps.detect.outputs.dir }}/404.html"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.detect.outputs.dir }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4